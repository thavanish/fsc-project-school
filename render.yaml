services:
  - type: web
    name: face-lab-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://face.thavanish.dedyn.io,http://localhost:4321
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_FILE
        value: data/faces.json
      - key: MATCH_THRESHOLD
        value: "0.55"
      - key: AMBIGUITY_MARGIN
        value: "0.035"
      - key: MAX_UPLOAD_BYTES
        value: "4300000"
      - key: IMAGE_MAX_SIDE
        value: "960"
      - key: REGISTER_JITTERS
        value: "2"
      - key: QUERY_JITTERS
        value: "1"
